name: GitHub Release

# Auto-creates a GitHub Release with generated changelog notes when a tag
# matching v* (engine releases) or wrapper-v* (TS wrapper releases) is pushed.
#
# Tag conventions:
#   v0.3.0         — amplifier-agent engine (Python)
#   wrapper-v0.3.0 — amplifier-agent-client-ts (TypeScript)
#
# A tag suffix containing '-' (e.g. v0.3.0-rc1, wrapper-v0.3.0-alpha) is
# auto-marked as a prerelease.

on:
  push:
    tags:
      - 'v*'
      - 'wrapper-v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the release-notes generator can diff against
          # the previous tag in the same series.
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
