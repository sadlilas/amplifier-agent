name: install-script

on:
  pull_request:
    paths:
      - install.sh
      - .github/workflows/install-script.yml
  push:
    branches: [main]
    paths:
      - install.sh
      - .github/workflows/install-script.yml

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck install.sh

  smoke-test:
    name: smoke test (no-prime, pinned tag)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: python:3.12-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run installer (no prime, pinned stable tag)
        run: bash install.sh --no-prime --yes --tag v0.9.0

      - name: Verify install
        run: amplifier-agent --help
